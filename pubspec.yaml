name: my_device
description: "MyDevice!!!!! — Your personal device inventory"
publish_to: 'none'

version: 0.2.0+6

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^1.0.4

  # Navigation
  go_router: ^14.8.1

  # Theming
  flex_color_scheme: ^8.2.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0

  # i18n
  intl: ^0.20.2

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5
  file_picker: ^9.2.1
  package_info_plus: ^9.0.0
  device_preview: ^1.2.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.4.0

  # Archive
  archive: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.8

flutter:

  generate: true

  uses-material-design: true

  assets:
    - assets/logos/
    - assets/presets/

msix_config:
  display_name: MyDevice!!!!!
  publisher_display_name: yuanzhe
  identity_name: com.yuanzhe.mydevice
  msix_version: 0.1.2.0
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient
  install_certificate: false
